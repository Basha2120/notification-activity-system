{% extends "base.html" %}
{% block title %}New Post — NotifyHub{% endblock %}
{% block content %}
<div class="container" style="max-width:560px">
  <div class="page-header">
    <h1 class="page-title">New Post</h1>
    <a href="/posts/" style="color:var(--muted);font-size:0.875rem;text-decoration:none">Cancel</a>
  </div>
  
  <div class="card" style="padding:1.5rem">
    <form method="post">
      {% csrf_token %}
      <div class="form-group">
        <label>Title</label>
        <input type="text" name="title" placeholder="What's on your mind?" autofocus required>
      </div>
      <div class="form-group">
        <label>Body</label>
        <textarea name="body" rows="6" placeholder="Details…" required></textarea>
      </div>
      <button type="submit" class="btn btn-primary" style="width:100%">Publish Post</button>
    </form>
  </div>
</div>
{% endblock %}
