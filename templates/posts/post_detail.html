{% extends "base.html" %}
{% block title %}{{ post.title }} — NotifyHub{% endblock %}
{% block content %}
<div class="container">
  <div style="margin-bottom:1rem">
    <a href="/posts/" style="color:var(--muted);font-size:0.85rem;text-decoration:none;display:inline-block">← Back to Posts</a>
  </div>

  <div class="card" style="padding:1.5rem;margin-bottom:1rem">
    <div style="display:flex;align-items:center;gap:0.6rem;margin-bottom:1rem">
      <span style="width:36px;height:36px;border-radius:50%;background:var(--accent);display:flex;align-items:center;justify-content:center;font-size:0.85rem;font-weight:700;color:#fff">
        {{ post.author.username|first|upper }}
      </span>
      <div>
        <span style="font-weight:600;font-size:0.875rem;color:var(--text)">
          {{ post.author.username }}
        </span>
        <div style="font-size:0.72rem;color:var(--muted)">{{ post.created_at|timesince }} ago</div>
      </div>
    </div>
    <h1 style="font-family:var(--font-display);font-size:1.5rem;font-weight:800;margin-bottom:0.75rem">{{ post.title }}</h1>
    <p style="font-size:0.9rem;line-height:1.7;color:var(--muted)">{{ post.body }}</p>
  </div>
</div>
{% endblock %}
