{% extends "base.html" %}
{% block title %}Delete Post — NotifyHub{% endblock %}
{% block content %}
<div class="container" style="max-width:500px">
  <div class="page-header">
    <h1 class="page-title">Delete Post</h1>
  </div>
  <div class="card" style="padding:1.5rem">
    <p style="margin-bottom:1.5rem; color:var(--muted)">Are you sure you want to delete <strong>"{{ post.title }}"</strong>? This action cannot be undone.</p>
    <div style="display:flex; gap:1rem">
      <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-primary" style="background:var(--red)">Delete Permanently</button>
      </form>
      <a href="{% url 'post-detail' post.pk %}" class="btn btn-ghost">Cancel</a>
    </div>
  </div>
</div>
{% endblock %}
